<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASTRA Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <meta name="color-scheme" content="light dark" />
  </head>
  <body>
    <div class="dashboard-grid">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h3>ASTRA</h3>
        </div>
        <nav class="sidebar-nav">
          <ul>
            <li>
              <a href="dashboard.html" class="active"
                ><i class="fas fa-tachometer-alt"></i> Dashboard</a
              >
            </li>
            <li>
              <a href="alerts.html"><i class="fas fa-shield-alt"></i> Alerts</a>
            </li>
            <li>
              <a href="endpoints.html"
                ><i class="fas fa-desktop"></i> Endpoints</a
              >
            </li>
            <li>
              <a href="#"><i class="fas fa-brain"></i> AI Models</a>
            </li>
            <li>
              <a href="#"><i class="fas fa-link"></i> Blockchain Log</a>
            </li>
            <li>
              <a href="#"><i class="fas fa-file-alt"></i> Reports</a>
            </li>
            <li class="logout">
              <a href="index.html"
                ><i class="fas fa-sign-out-alt"></i> Logout</a
              >
            </li>
          </ul>
        </nav>
      </aside>

      <main class="main-content">
        <header class="main-header">
          <h2>Dashboard Overview</h2>
          <div class="header-actions">
            <div class="search" role="search">
              <i class="fas fa-search" aria-hidden="true"></i>
              <input
                type="search"
                placeholder="Search alerts, endpoints..."
                aria-label="Search"
              />
            </div>
            <div class="accent-picker" role="group" aria-label="Accent color">
              <button
                class="accent-swatch"
                data-accent="teal"
                style="--swatch: #0d9488"
                aria-label="Teal"
                aria-pressed="true"
              ></button>
              <!-- Additional accents temporarily hidden
                        <button class="accent-swatch" data-accent="emerald" style="--swatch:#10b981" aria-label="Emerald"></button>
                        <button class="accent-swatch" data-accent="violet" style="--swatch:#8b5cf6" aria-label="Violet"></button>
                        <button class="accent-swatch" data-accent="indigo" style="--swatch:#4f46e5" aria-label="Indigo"></button>
                        <button class="accent-swatch" data-accent="amber" style="--swatch:#f59e0b" aria-label="Amber"></button>
                        <button class="accent-swatch" data-accent="rose" style="--swatch:#e11d48" aria-label="Rose"></button>
                        <button class="accent-swatch" data-accent="red" style="--swatch:#ef4444" aria-label="Red"></button>
                        <button class="accent-swatch" data-accent="orange" style="--swatch:#f97316" aria-label="Orange"></button>
                        <button class="accent-swatch" data-accent="lime" style="--swatch:#84cc16" aria-label="Lime"></button>
                        <button class="accent-swatch" data-accent="cyan" style="--swatch:#06b6d4" aria-label="Cyan"></button>
                        <button class="accent-swatch" data-accent="sky" style="--swatch:#0ea5e9" aria-label="Sky"></button>
                        <button class="accent-swatch" data-accent="purple" style="--swatch:#a855f7" aria-label="Purple"></button>
                        <button class="accent-swatch" data-accent="fuchsia" style="--swatch:#d946ef" aria-label="Fuchsia"></button>
                        <button class="accent-swatch" data-accent="slate" style="--swatch:#64748b" aria-label="Slate"></button>
                        <button class="accent-swatch" data-accent="blush" style="--swatch:#f472b6" aria-label="Blush"></button>
                        <button class="accent-swatch" data-accent="coral" style="--swatch:#fb7185" aria-label="Coral"></button>
                        <button class="accent-swatch" data-accent="peach" style="--swatch:#fb923c" aria-label="Peach"></button>
                        <button class="accent-swatch" data-accent="sage" style="--swatch:#84a98c" aria-label="Sage"></button>
                        <button class="accent-swatch" data-accent="mint" style="--swatch:#2dd4bf" aria-label="Mint"></button>
                        <button class="accent-swatch" data-accent="ocean" style="--swatch:#0891b2" aria-label="Ocean"></button>
                        <button class="accent-swatch" data-accent="lavender" style="--swatch:#c084fc" aria-label="Lavender"></button>
                        <button class="accent-swatch" data-accent="periwinkle" style="--swatch:#8ea2ff" aria-label="Periwinkle"></button>
                        <button class="accent-swatch" data-accent="rose-gold" style="--swatch:#b76e79" aria-label="Rose Gold"></button>
                        <button class="accent-swatch" data-accent="bronze" style="--swatch:#b87333" aria-label="Bronze"></button>
                        -->
            </div>
            <button
              class="theme-toggle"
              id="themeToggle"
              aria-label="Toggle theme"
            >
              <i class="fas fa-moon" aria-hidden="true"></i>
            </button>
            <div
              class="user-profile"
              role="button"
              tabindex="0"
              aria-label="Profile"
            >
              <span>Admin</span>
              <img
                src="https://ui-avatars.com/api/?name=A&background=007bff&color=fff"
                alt="Admin avatar"
              />
            </div>
          </div>
        </header>

        <section class="stat-cards">
          <div class="card card-critical">
            <div class="card-icon">
              <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div class="card-info">
              <h4>Critical Alerts</h4>
              <p>12</p>
            </div>
          </div>
          <div class="card">
            <div class="card-icon"><i class="fas fa-desktop"></i></div>
            <div class="card-info">
              <h4>Endpoints Monitored</h4>
              <p>1,204</p>
            </div>
          </div>
          <div class="card">
            <div class="card-icon"><i class="fas fa-brain"></i></div>
            <div class="card-info">
              <h4>AI Detections (24h)</h4>
              <p>87</p>
            </div>
          </div>
          <div class="card">
            <div class="card-icon"><i class="fas fa-link"></i></div>
            <div class="card-info">
              <h4>Logs Secured</h4>
              <p>1,450,230</p>
            </div>
          </div>
        </section>

        <section class="main-widgets">
          <div class="widget widget-large">
            <h3>Alerts Over Time</h3>
            <canvas
              id="alertsOverTimeChart"
              height="250"
              aria-label="Alerts over time chart"
              role="img"
            ></canvas>
          </div>
          <div class="widget widget-medium">
            <h3>Alerts by Severity</h3>
            <canvas
              id="alertsBySeverityChart"
              height="250"
              aria-label="Alerts by severity chart"
              role="img"
            ></canvas>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
